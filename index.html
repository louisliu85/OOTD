<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>凹逗穿搭靈感誌</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Noto+Sans+TC:wght@400;600;700;900&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        // 貨號與名稱優先使用 Inter
                        sans: ['Inter', 'Noto Sans TC', 'sans-serif'],
                        // 價格優先使用 Decathlon VF
                        price: ['"Decathlon VF"', 'Inter', 'Noto Sans TC', 'sans-serif']
                    },
                    colors: {
                        blue: {
                            50: '#edf0fd', 100: '#dfe4fa', 200: '#c5cbf6', 300: '#9eaaf0',
                            400: '#7281e8', 500: '#4f5bdd', 600: '#3643ba', 700: '#2c35a6',
                            800: '#262d87', 900: '#242a6c',
                        },
                        amber: { 500: '#f59e0b', 600: '#d97706' }
                    }
                }
            }
        }
    </script>
    
    <!-- Dependencies -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        @font-face {
            font-family: "Decathlon VF";
            /* 填入您的字體路徑 */
            src: url("https://www.decathlon.tw/fonts/Decathlon-VF.woff2") format("woff2");
            font-weight: 100 900;
            font-style: normal;
            font-display: swap;
        }

        /* 核心互動動畫 */
        @keyframes verticalBlurSpin {
            0% { filter: blur(0px); transform: translateY(0); }
            25% { filter: blur(2px); transform: translateY(-10px); opacity: 0.8;}
            50% { filter: blur(4px); transform: translateY(10px); opacity: 0.5;}
            75% { filter: blur(2px); transform: translateY(-10px); opacity: 0.8;}
            100% { filter: blur(0px); transform: translateY(0); }
        }
        .spinning-effect { animation: verticalBlurSpin 0.1s infinite linear; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes fadeUp {
            from { opacity: 0; transform: translate(-50%, 10px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
        .toast-enter { animation: fadeUp 0.3s ease-out forwards; }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(100%); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-enter { animation: slideUp 0.3s ease-out forwards; }

        body {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased selection:bg-blue-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        const categoryLabels = { hat: "帽子", top: "衣服", bottom: "褲子", shoes: "鞋子", accessory: "配件" };
        const categoryOrder = ["hat", "top", "bottom", "shoes", "accessory"];

        // --- 穿搭情境知識庫 ---
        const scenarioTips = {
            all: { title: "🌍 綜合通用", text: "依據日常或輕度戶外活動，挑選舒適、好活動且具備基礎機能的服飾。" },
            trekking: { title: "🥾 登山健行【洋蔥式穿法】", text: "山區氣候多變，建議採用洋蔥式穿法：\n1. 內層：吸濕排汗 (保持身體乾爽)\n2. 中層：刷毛或羽絨 (維持體溫)\n3. 外層：防風防水 (抵禦風雨變化)" },
            baiyue: { title: "⛰️ 百岳重裝【洋蔥式穿法】", text: "因應氣候變化，建議採用洋蔥式穿法：\n1. 內層：吸濕排汗 (保持身體乾爽)\n2. 中層：刷毛或羽絨 (維持體溫)\n3. 外層：防風防水 (抵禦風雨變化)。\n頭部保暖與高筒專業登山鞋絕對不可少！" },
            hiking: { title: "🚶 徒步旅行", text: "長時間平地或緩坡徒步，首重透氣排汗與足部舒適支撐，建議選擇輕量化、防曬抗 UV 的裝備。" },
            island: { title: "🧳 徒步環島", text: "長途跋涉首重雙腳與雙肩！登山鞋與登山包可減輕身體負擔；\n衣著則建議吸濕排汗材質為主，並攜帶輕便易收納的雨衣，應付長時間日曬與多變天候。" },
            winter: { title: "❄️ 冬季保暖", text: "低溫防寒必備！內層挑選美麗諾羊毛或保暖底層，搭配羽絨中層與防風外層，並注意頭部與四肢的保暖。" }
        };

        // --- Icons ---
        const LockIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
        const UnlockIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>;
        const ChevronLeftIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>;
        const ChevronRightIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>;
        const DicesIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><circle cx="15.5" cy="15.5" r="1.5"></circle><circle cx="15.5" cy="8.5" r="1.5"></circle><circle cx="8.5" cy="15.5" r="1.5"></circle></svg>;
        const XIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
        const ArrowLeftIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>;
        const ExternalLinkIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>;
        const FilterIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>;
        const BookOpenIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>;
        const GridIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>;

        const ToggleBtn = ({ active, onClick, className = "", children }) => (
            <button type="button" onClick={onClick} className={`py-1.5 px-2 rounded-lg text-[11px] font-bold border-2 transition-all flex items-center justify-center space-x-1 focus:outline-none ${active ? 'border-blue-600 bg-blue-50 text-blue-700 shadow-sm' : 'border-gray-200 bg-white text-gray-500 hover:border-gray-300'} ${className}`}>
                {children}
            </button>
        );

        // --- 拉霸機卡片組件 ---
        const SlotItem = ({ category, items, selectedIndex, isLocked, isSpinning, onSelect, onToggleLock }) => {
            const currentItem = items[selectedIndex];
            const isPresetItem = currentItem?.isOwned || currentItem?.isCart;
            
            const [navVisible, setNavVisible] = useState(true);
            const timerRef = useRef(null);

            const showNavTemporarily = () => {
                setNavVisible(true);
                if (timerRef.current) clearTimeout(timerRef.current);
                timerRef.current = setTimeout(() => setNavVisible(false), 3000);
            };

            useEffect(() => {
                if (!isSpinning && !isLocked && !isPresetItem) showNavTemporarily();
                else { setNavVisible(false); if (timerRef.current) clearTimeout(timerRef.current); }
                return () => clearTimeout(timerRef.current);
            }, [isSpinning, isLocked, isPresetItem, selectedIndex]);

            const handlePrev = (e) => {
                if (e) e.stopPropagation(); 
                if (isSpinning || !items || items.length === 0) return;
                onSelect(selectedIndex === 0 ? items.length - 1 : selectedIndex - 1);
            };
            const handleNext = (e) => {
                if (e) e.stopPropagation();
                if (isSpinning || !items || items.length === 0) return;
                onSelect(selectedIndex === items.length - 1 ? 0 : selectedIndex + 1);
            };

            return (
                <div className={`flex-1 min-h-0 max-h-[120px] flex bg-white rounded-xl shadow-sm border-2 transition-colors overflow-hidden ${isLocked ? (currentItem?.isOwned ? 'border-gray-300 bg-gray-50' : currentItem?.isCart ? 'border-amber-400 bg-amber-50' : 'border-orange-400 bg-orange-50') : 'border-transparent hover:border-blue-200'}`}>
                    
                    {/* 左側：拉霸機圖片 */}
                    <div 
                        className="h-full aspect-square relative bg-gray-100 flex-shrink-0 flex items-center justify-center border-r border-gray-100 cursor-pointer overflow-hidden"
                        onClick={showNavTemporarily}
                    >
                        {currentItem ? (
                            <React.Fragment>
                                <img 
                                    src={currentItem.img} 
                                    alt={currentItem.name} 
                                    onError={(e) => { e.target.src = 'https://placehold.co/400x400/eeeeee/999999?text=無圖片'; }} 
                                    className={`w-full h-full object-cover mix-blend-multiply transition-all ${isSpinning && !isLocked ? 'spinning-effect opacity-60' : 'opacity-100'}`} 
                                />
                                {!isSpinning && !isLocked && (
                                    <React.Fragment>
                                        <button onClick={handlePrev} className={`absolute left-1 w-5 h-5 bg-white/80 hover:bg-white rounded-full flex items-center justify-center shadow-sm text-gray-600 transition-all duration-500 ${navVisible ? 'opacity-90' : 'opacity-0 pointer-events-none'}`}><ChevronLeftIcon /></button>
                                        <button onClick={handleNext} className={`absolute right-1 w-5 h-5 bg-white/80 hover:bg-white rounded-full flex items-center justify-center shadow-sm text-gray-600 transition-all duration-500 ${navVisible ? 'opacity-90' : 'opacity-0 pointer-events-none'}`}><ChevronRightIcon /></button>
                                    </React.Fragment>
                                )}
                                {currentItem.isOwned && (
                                    <div className="absolute inset-0 bg-gray-900/50 flex items-center justify-center text-white text-[10px] font-bold backdrop-blur-[1px]">✅ 已擁有</div>
                                )}
                                {currentItem.isCart && (
                                    <div className="absolute inset-0 bg-amber-900/30 flex items-center justify-center text-white text-[10px] font-bold backdrop-blur-[1px]">🛒 購物車</div>
                                )}
                                {!isPresetItem && <div className={`absolute bottom-0.5 right-0.5 bg-black/50 text-white text-[7px] px-1 py-0.5 rounded transition-opacity duration-500 ${navVisible ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>{selectedIndex + 1}/{items.length}</div>}
                            </React.Fragment>
                        ) : (
                            <div className="text-[9px] text-gray-400 text-center">無商品</div>
                        )}
                    </div>

                    {/* 右側：商品資訊 (💡 調整 pt 與 pb 讓重心上移) */}
                    <div className="flex-1 pt-1.5 pb-2.5 px-2 flex flex-col min-w-0 bg-white">
                        <div className="flex justify-between items-center mb-0.5">
                            <div className="flex items-center space-x-1.5 overflow-hidden">
                                <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded flex-shrink-0 ${currentItem?.isOwned ? 'bg-gray-200 text-gray-600' : currentItem?.isCart ? 'bg-amber-100 text-amber-700' : 'bg-blue-50 text-blue-600'}`}>
                                    {categoryLabels[category]}
                                </span>
                                <span className="text-[9px] text-gray-400 font-sans truncate">{currentItem?.id || '----'}</span>
                            </div>
                            <button onClick={onToggleLock} disabled={isSpinning || !currentItem} className={`p-1 -mr-1 rounded-full transition-colors flex-shrink-0 focus:outline-none ${isLocked ? 'text-orange-500 bg-orange-50' : 'text-gray-400 hover:bg-gray-100'} disabled:opacity-50`} title="鎖定/解除鎖定">
                                {isLocked ? <LockIcon /> : <UnlockIcon />}
                            </button>
                        </div>

                        <div className="mb-0.5 ml-1">
                            <h4 className="text-[11px] font-bold text-gray-800 line-clamp-2 leading-snug">{currentItem?.name || '---'}</h4>
                        </div>

                        <div className="flex justify-between items-end mt-0.5 ml-1">
                            {currentItem?.isOwned ? (
                                <span className="text-[11px] font-black text-gray-400 font-sans tracking-tighter">免算錢</span>
                            ) : (
                                <span className={`text-[14px] font-black font-price tracking-tighter leading-none ${currentItem?.isCart ? 'text-amber-600' : 'text-gray-900'}`}>
                                    ${(currentItem?.price || 0).toLocaleString()}
                                </span>
                            )}
                            {currentItem?.id && (
                                <a 
                                    href={`https://www.decathlon.tw/${currentItem.id}/1769`} 
                                    target="_blank" 
                                    rel="noopener noreferrer" 
                                    className="text-[9px] bg-blue-50 text-blue-600 border border-blue-100 hover:bg-blue-600 hover:text-white px-1.5 py-0.5 rounded transition-colors flex items-center space-x-0.5 whitespace-nowrap relative top-1 focus:outline-none"
                                >
                                    <span>官網連結</span>
                                    <ExternalLinkIcon />
                                </a>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // --- 主應用程式 ---
        const App = () => {
            const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR14WxdTycKfRM64qq13BxMrMH7OUOONQFhvr2StbozuNBcwulMwyb9H2Q3_nX9DoKvk4DCDGY5E8x-/pub?output=csv"; 
            const LOOKBOOK_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR14WxdTycKfRM64qq13BxMrMH7OUOONQFhvr2StbozuNBcwulMwyb9H2Q3_nX9DoKvk4DCDGY5E8x-/pub?gid=378637456&single=true&output=csv"; 

            const [dbData, setDbData] = useState(null);
            const [lookbookData, setLookbookData] = useState([]); 
            
            const [isDbLoading, setIsDbLoading] = useState(true);
            const [dbFatalError, setDbFatalError] = useState(false);
            const [updateDate, setUpdateDate] = useState('讀取中...'); 

            const [view, setView] = useState('magazine'); 
            
            const [budget, setBudget] = useState(4000); 
            const [scenario, setScenario] = useState('all');
            
            const [targetGender, setTargetGender] = useState('all');
            const [catalogGenders, setCatalogGenders] = useState(['men', 'women', 'kids']);
            const [catalogScenario, setCatalogScenario] = useState('all');
            const [presetItems, setPresetItems] = useState([]); 
            const [presetInputCat, setPresetInputCat] = useState('top');
            const [presetInputId, setPresetInputId] = useState('');
            const [presetType, setPresetType] = useState('owned'); 
            const [toast, setToast] = useState("");

            const [filteredDb, setFilteredDb] = useState(null);
            const [selections, setSelections] = useState({ hat: 0, top: 0, bottom: 0, shoes: 0, accessory: 0 });
            const [locked, setLocked] = useState({ hat: false, top: false, bottom: false, shoes: false, accessory: false });
            const [spinningStates, setSpinningStates] = useState({ hat: false, top: false, bottom: false, shoes: false, accessory: false });
            const [isOverBudget, setIsOverBudget] = useState(false);
            
            const [catalogActiveTab, setCatalogActiveTab] = useState('all');
            const [isFilterModalOpen, setIsFilterModalOpen] = useState(false);

            useEffect(() => {
                if (!GOOGLE_SHEET_CSV_URL) {
                    setDbFatalError(true);
                    setIsDbLoading(false);
                    return;
                }

                const fetchDatabase = new Promise((resolve, reject) => {
                    Papa.parse(GOOGLE_SHEET_CSV_URL, {
                        download: true,
                        header: true,
                        complete: (results) => {
                            try {
                                const parsedData = { hat: [], top: [], bottom: [], shoes: [], accessory: [] };
                                let fetchedDate = ''; 
                                
                                results.data.forEach(row => {
                                    if (!fetchedDate && row.date && row.date.trim() !== '') fetchedDate = row.date.trim();

                                    const cat = row.category?.trim().toLowerCase();
                                    if (row.id && cat && parsedData[cat]) {
                                        const n = row.name?.trim() || "未命名商品";
                                        let itemGender = '中性';
                                        if (row.gender && row.gender.trim() !== '') itemGender = row.gender.trim();
                                        let itemLabels = row.label && row.label.trim() !== '' ? row.label.trim() : '';

                                        parsedData[cat].push({
                                            id: row.id.trim(),
                                            name: n,
                                            price: parseInt(row.price, 10) || 0,
                                            img: `https://product-picture.decathlon.cn/model/${row.id.trim()}.jpg?f=1000`,
                                            label: itemLabels,
                                            gender: itemGender
                                        });
                                    }
                                });

                                categoryOrder.forEach(cat => {
                                    if (parsedData[cat].length === 0) throw new Error(`分類 '${cat}' 缺少商品`);
                                });

                                setDbData(parsedData);
                                setUpdateDate(fetchedDate || new Date().toLocaleDateString('zh-TW'));
                                resolve();
                            } catch (err) {
                                reject(err);
                            }
                        },
                        error: (err) => reject(err)
                    });
                });

                const fetchLookbook = new Promise((resolve, reject) => {
                    if (!LOOKBOOK_CSV_URL) { reject(new Error("未提供雜誌網址")); return; }
                    Papa.parse(LOOKBOOK_CSV_URL, {
                        download: true,
                        header: true,
                        complete: (results) => {
                            try {
                                const parsedLookbook = [];
                                results.data.forEach((row, index) => {
                                    if (row.title && row.title.trim() !== '') {
                                        parsedLookbook.push({
                                            id: index + 1,
                                            title: row.title.trim(),
                                            desc: row.description ? row.description.trim() : "",
                                            coverImg: row.cover_image && row.cover_image.trim() !== '' ? row.cover_image.trim() : "https://images.unsplash.com/photo-1551632811-561732d1e306?q=80&w=1000&auto=format&fit=crop",
                                            productIds: row.product_ids ? row.product_ids.split(/[,、]/).map(id => id.trim()).filter(id => id) : []
                                        });
                                    }
                                });

                                if (parsedLookbook.length > 0) {
                                    setLookbookData(parsedLookbook);
                                    resolve();
                                } else {
                                    reject(new Error("雜誌資料庫無有效資料"));
                                }
                            } catch (err) { reject(err); }
                        },
                        error: (err) => reject(err)
                    });
                });

                Promise.all([fetchDatabase, fetchLookbook])
                    .then(() => setIsDbLoading(false))
                    .catch(err => {
                        console.error("載入發生致命錯誤：", err);
                        setDbFatalError(true);
                        setIsDbLoading(false);
                    });

            }, []);

            const showMsg = (m) => { setToast(m); setTimeout(() => setToast(""), 3000); };

            const handleAddPreset = (e) => {
                e.preventDefault();
                if (!presetInputId.trim()) return showMsg("請輸入商品貨號！");
                if (presetItems.some(i => i.id === presetInputId.trim())) return showMsg("已經加入過這個商品了！");
                if (presetItems.some(i => i.category === presetInputCat)) return showMsg(`每個分類只能加入一件預設商品喔！`);
                
                let foundName = "我的專屬裝備";
                let foundPrice = 999;
                if (dbData) {
                    Object.values(dbData).forEach(catItems => {
                        const item = catItems.find(i => i.id === presetInputId.trim());
                        if (item) { foundName = item.name; foundPrice = item.price; }
                    });
                }

                setPresetItems([...presetItems, { category: presetInputCat, id: presetInputId.trim(), name: foundName, type: presetType, realPrice: foundPrice }]);
                setPresetInputId('');
                showMsg(`已加入: ${foundName}`);
            };

            const handleRemovePreset = (id) => setPresetItems(presetItems.filter(i => i.id !== id));

            const generateFilteredDb = useCallback((currentScenario, genderCondition, currentPresetItems = presetItems) => {
                if (!dbData) return null;
                const scenarioKeywords = {
                    trekking: ['健行'], baiyue: ['百岳'], hiking: ['徒步'],
                    island: ['環島'], winter: ['冬季']
                };

                let newDb = {};

                    if (items.length === 0) {

                            let gMatch = false;

                            if (Array.isArray(genderCondition)) {
                                if (genderCondition.length === 3) gMatch = true;

                                    if (genderCondition.includes('kids') && (gText.includes('兒童') || gText.includes('童'))) gMatch = true;
                                    if (genderCondition.includes('men') && (gText.includes('男') || gText.includes('中性'))) gMatch = true;

            if (view === 'catalog') {
                const visibleCategories = catalogActiveTab === 'all' ? categoryOrder : [catalogActiveTab];

                return (
                    <div className="h-[100dvh] bg-gray-50 flex justify-center overflow-hidden relative">
                        {toast && <div className="fixed top-14 left-1/2 transform -translate-x-1/2 z-50 toast-enter bg-gray-900 text-white px-4 py-2 rounded-lg text-xs font-bold shadow-xl">{toast}</div>}
                        
                        <div className="w-full max-w-md bg-gray-50 h-full shadow-2xl relative flex flex-col overflow-hidden">
                            
                            {/* 彈出式篩選視窗 Modal */}
                            {isFilterModalOpen && (
                                <div className="absolute inset-0 z-[100] flex flex-col justify-end bg-black/60 backdrop-blur-[2px] transition-all overflow-hidden">
                                    <div className="w-full bg-white rounded-t-3xl p-5 shadow-2xl modal-enter max-h-[85vh] flex flex-col">
                                        <div className="flex justify-between items-center mb-4 border-b border-gray-100 pb-3 flex-shrink-0">
                                            <h3 className="text-sm font-black text-gray-800 flex items-center">
                                                <FilterIcon /> <span className="ml-1.5">進階篩選</span>
                                            </h3>
                                            <button onClick={() => setIsFilterModalOpen(false)} className="p-1 text-gray-400 hover:text-red-500 transition-colors focus:outline-none"><XIcon /></button>
                                        </div>
                                        
                                        <div className="mb-6 overflow-y-auto no-scrollbar">
                                            <div className="mb-5">
                                                <label className="text-xs font-bold text-gray-500 mb-3 block">裝備對象（三格全亮即為全選）</label>
                                                <div className="grid grid-cols-3 gap-2">
                                                    <button onClick={() => {
                                                        setCatalogGenders(prev => prev.includes('men') ? (prev.length > 1 ? prev.filter(x => x !== 'men') : prev) : [...prev, 'men']);
                                                    }} className={`py-3 rounded-xl text-xs font-bold border-2 transition-all focus:outline-none ${catalogGenders.includes('men') ? 'border-blue-600 bg-blue-50 text-blue-700 shadow-sm' : 'border-gray-200 text-gray-500 hover:border-gray-300'}`}>👦 男款</button>
                                                    <button onClick={() => {
                                                        setCatalogGenders(prev => prev.includes('women') ? (prev.length > 1 ? prev.filter(x => x !== 'women') : prev) : [...prev, 'women']);
                                                    }} className={`py-3 rounded-xl text-xs font-bold border-2 transition-all focus:outline-none ${catalogGenders.includes('women') ? 'border-blue-600 bg-blue-50 text-blue-700 shadow-sm' : 'border-gray-200 text-gray-500 hover:border-gray-300'}`}>👧 女款</button>
                                                    <button onClick={() => {
                                                        setCatalogGenders(prev => prev.includes('kids') ? (prev.length > 1 ? prev.filter(x => x !== 'kids') : prev) : [...prev, 'kids']);
                                                    }} className={`py-3 rounded-xl text-xs font-bold border-2 transition-all focus:outline-none ${catalogGenders.includes('kids') ? 'border-blue-600 bg-blue-50 text-blue-700 shadow-sm' : 'border-gray-200 text-gray-500 hover:border-gray-300'}`}>👶 兒童</button>
                                                </div>
                                            </div>

                                            <div>
                                                <label className="text-xs font-bold text-gray-500 mb-3 block">行程情境</label>
                                                <div className="grid grid-cols-3 gap-2">
                                                    {Object.keys(scenarioTips).map(s => (
                                                        <button key={s} onClick={() => setCatalogScenario(s)} className={`py-3 rounded-xl text-xs font-bold border-2 transition-all flex items-center justify-center space-x-1 focus:outline-none ${catalogScenario === s ? 'border-blue-600 bg-blue-50 text-blue-700 shadow-sm' : 'border-gray-200 text-gray-500 hover:border-gray-300'}`}>
                                                            <span>{scenarioTips[s].title.split(' ')[0]}</span>
                                                            <span>{scenarioTips[s].title.split(' ')[1].split('【')[0]}</span>
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>

                                        <button onClick={() => setIsFilterModalOpen(false)} className="w-full py-4 bg-blue-600 text-white rounded-xl font-black text-sm tracking-widest uppercase hover:bg-blue-700 active:scale-95 transition-all shadow-lg flex-shrink-0 focus:outline-none">
                                            套用篩選條件
                                        </button>
                                    </div>
                                </div>
                            )}

                            {/* Header (💡 字體大小已調整與靈感誌相同) */}
                            <div className="bg-white shadow-sm z-20 flex-shrink-0 border-b border-gray-200">
                                <div className="px-4 py-3 flex justify-between items-center">
                                    <div className="w-8"></div>
                                    <div className="text-center w-full">
                                        <h1 className="text-sm font-black text-gray-800 tracking-widest uppercase">全品項裝備型錄</h1>
                                        <p className="text-[10px] text-blue-600 font-bold mt-0.5 tracking-widest">
                                            {catalogScenario === 'all' ? '通用' : scenarioTips[catalogScenario].title.split(' ')[1].split('【')[0]} | {catalogGenders.length === 3 ? '全部對象' : catalogGenders.map(g => g === 'men' ? '男' : g === 'women' ? '女' : '兒童').sort((a,b) => {
                                                const order = {'men': 0, 'women': 1, 'kids': 2};
                                                return order[a] - order[b];
                                            }).join('/')}
                                        </p>
                                    </div>
                                    <button onClick={() => setIsFilterModalOpen(true)} className="p-1.5 -mr-1 rounded-full text-gray-500 bg-gray-100 hover:bg-blue-100 hover:text-blue-600 transition-colors focus:outline-none" title="進階篩選">
                                        <FilterIcon />
                                    </button>
                                </div>

                                {/* 分類標籤 */}
                                <div className="flex overflow-x-auto no-scrollbar px-3 pt-1 pb-3 space-x-2">
                                    <button onClick={() => setCatalogActiveTab('all')} className={`flex-shrink-0 px-3 py-1.5 rounded-full text-[11px] font-bold border focus:outline-none ${catalogActiveTab === 'all' ? 'bg-gray-800 text-white border-gray-800 shadow-sm' : 'bg-white text-gray-500 border-gray-200 hover:bg-gray-50'}`}>
                                        全部裝備
                                    </button>
                                    {categoryOrder.map(cat => (
                                        <button key={`tab-${cat}`} onClick={() => setCatalogActiveTab(cat)} className={`flex-shrink-0 px-3 py-1.5 rounded-full text-[11px] font-bold border focus:outline-none ${catalogActiveTab === cat ? 'bg-blue-600 text-white border-blue-600 shadow-sm' : 'bg-white text-gray-500 border-gray-200 hover:bg-gray-50'}`}>
                                            {categoryLabels[cat]} <span className="opacity-80 ml-0.5 font-sans text-[9px]">({catalogItems ? catalogItems[cat].length : 0})</span>
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* 總覽內容 */}
                            <div className="flex-1 overflow-y-auto no-scrollbar p-3 space-y-4 pb-6">
                                {visibleCategories.map(cat => (
                                    <div key={cat} className="bg-white rounded-xl shadow-sm border border-gray-100 p-3">
                                        <h3 className="text-[11px] font-bold text-gray-800 mb-3 border-b border-gray-100 pb-2 flex items-center"><span className="w-1.5 h-3 bg-blue-600 rounded-full mr-1.5"></span>{categoryLabels[cat]}</h3>
                                        <div className="grid grid-cols-2 gap-3">
                                            {catalogItems && catalogItems[cat].map((item) => {
                                                const sessionIdx = filteredDb ? filteredDb[cat].findIndex(i => i.id === item.id) : -1;
                                                return (
                                                    <div key={item.id} className="flex flex-col border border-gray-100 rounded-xl overflow-hidden relative shadow-sm hover:border-blue-200 transition-colors">
                                                        <div className="w-full aspect-square bg-gray-50 relative flex items-center justify-center overflow-hidden">
                                                            <img src={item.img} alt={item.name} className="w-full h-full object-contain mix-blend-multiply" onError={(e) => { e.target.src = 'https://placehold.co/400x400/eeeeee/999999?text=無圖片'; }} />
                                                            {item.isOwned && <div className="absolute inset-0 bg-gray-900/50 flex items-center justify-center text-white text-[10px] font-bold backdrop-blur-[1px]">✅ 已擁有</div>}
                                                            {item.isCart && <div className="absolute inset-0 bg-amber-900/30 flex items-center justify-center text-white text-[10px] font-bold backdrop-blur-[1px]">🛒 購物車</div>}
                                                        </div>
                                                        <div className="p-2.5 flex flex-col flex-1 bg-white">
                                                            <h4 className="text-[11px] font-bold text-gray-800 line-clamp-2 leading-snug mb-0.5">{item.name}</h4>
                                                            <p className="text-[9px] text-gray-400 font-sans mb-1">{item.id}</p>
                                                            <p className="text-[13px] font-black text-gray-800 font-price mb-2">${(item.price || 0).toLocaleString()}</p>
                                                            <button 
                                                                onClick={() => {
                                                                    let currentDb = filteredDb || generateFilteredDb(scenario, targetGender);
                                                                    let targetIdx = currentDb[cat].findIndex(i => i.id === item.id);
                                                                    if (targetIdx === -1) {
                                                                        const updatedCatList = [item, ...currentDb[cat]];
                                                                        const updatedDb = { ...currentDb, [cat]: updatedCatList };
                                                                        setFilteredDb(updatedDb);
                                                                        targetIdx = 0;
                                                                    } else {
                                                                        setFilteredDb(currentDb);
                                                                    }
                                                                    returnToSlot({...locked, [cat]: true}, {...selections, [cat]: targetIdx});
                                                                }}
                                                                className="mt-auto w-full py-2 bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white text-[10px] font-bold rounded-lg transition-colors flex justify-center items-center focus:outline-none"
                                                            >
                                                                加入拉霸機
                                                            </button>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))}

                                <div className="pt-4 pb-6 text-[10px] text-gray-400 text-center leading-relaxed">
                                    此頁推薦內容僅供參考，實際商品與價格以現場為準。<br/>最後更新日期：{updateDate}
                                </div>
                            </div>

                            <BottomNav />
                        </div>
                    </div>
                );
            }

            // --- 視圖 2：滿版動態拉霸機 ---
            const cartCount = presetItems.filter(i => i.type === 'cart').length;
            const ownedCount = presetItems.filter(i => i.type === 'owned').length;

            return (
                <div className="h-[100dvh] bg-gray-50 flex justify-center overflow-hidden relative">
                    {toast && <div className="fixed top-14 left-1/2 transform -translate-x-1/2 z-50 toast-enter bg-gray-900 text-white px-4 py-2 rounded-lg text-xs font-bold shadow-xl">{toast}</div>}
                    
                    <div className="w-full max-w-md bg-gray-50 h-full shadow-2xl relative flex flex-col">
                        
                        {/* 頂部 Header */}
                        <div className="bg-white px-4 py-3 shadow-sm z-20 flex-shrink-0 flex justify-between items-center border-b border-gray-200">
                            <button onClick={() => {
                                const syncedPresets = [];
                                categoryOrder.forEach(cat => {
                                    if (locked[cat] && filteredDb && filteredDb[cat]) {
                                        const item = filteredDb[cat][selections[cat]];
                                        if (item) {
                                            syncedPresets.push({
                                                category: cat,
                                                id: item.id,
                                                name: item.name,
                                                type: item.isOwned ? 'owned' : 'cart',
                                                realPrice: item.price
                                            });
                                        }
                                    }
                                });
                                setPresetItems(syncedPresets);
                                setView('setup');
                            }} className="p-2 -ml-2 rounded-full text-blue-600 bg-blue-50 hover:bg-blue-100 transition-colors focus:outline-none" title="回到設定">
                                <ArrowLeftIcon />
                            </button>
                            <div className="text-center">
                                <h1 className="text-sm font-black text-gray-800 tracking-widest uppercase">登山健行裝備拉霸機</h1>
                                <p className="text-[10px] text-blue-600 font-bold mt-0.5">
                                    ${budget.toLocaleString()} | {targetGender==='all'?'不拘':targetGender==='men'?'男':targetGender==='women'?'女':'童'} | { } 
                                    {scenario==='all'?'通用':scenarioTips[scenario].title.split(' ')[1].split('【')[0]}
                                </p>
                            </div>
                            <div className="w-7"></div> 
                        </div>

                        <div className="flex-1 flex flex-col justify-center p-2.5 gap-2 overflow-hidden z-10">
                            {filteredDb && categoryOrder.map((cat) => (
                                <SlotItem 
                                    key={cat} category={cat} items={filteredDb[cat]}
                                    selectedIndex={selections[cat]} isLocked={locked[cat]}
                                    isSpinning={spinningStates[cat]}
                                    onSelect={(idx) => setSelections(p => ({...p, [cat]: idx}))}
                                    onToggleLock={() => setLocked(p => ({...p, [cat]: !p[cat]}))}
                                />
                            ))}
                        </div>

                        {/* 底部控制列 */}
                        <div className="bg-white/95 backdrop-blur-md border-t border-gray-200 shadow-[0_-5px_15px_rgba(0,0,0,0.05)] rounded-t-2xl z-20 flex-shrink-0 pb-safe">
                            <div className="p-4 flex justify-between items-center">
                                
                                <div className="flex flex-col items-start flex-1 pr-2">
                                    <span className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">目前搭配總金額</span>
                                    <span className={`text-2xl font-black font-price tracking-tighter transition-colors leading-none ${isOverBudget ? 'text-red-500' : 'text-gray-900'}`}>
                                        ${currentTotal.toLocaleString()}
                                    </span>
                                    
                                    {isOverBudget && (
                                        <span className="text-[10px] font-bold text-red-500 font-price animate-pulse mt-1.5">
                                            ⚠️ 超出預算 ${(currentTotal - budget).toLocaleString()}
                                        </span>
                                    )}
                                    
                                    {(ownedCount > 0 || cartCount > 0) && (
                                        <div className="flex flex-col space-y-0.5 mt-1.5">
                                            {ownedCount > 0 && <span className="text-[9px] text-gray-500 font-medium">✅ 扣除已購買裝備</span>}
                                            {cartCount > 0 && <span className="text-[9px] text-amber-600 font-medium">🛒 含購物車鎖定商品</span>}
                                        </div>
                                    )}
                                </div>
                                
                                <button 
                                    onClick={handleSpinAll}
                                    disabled={isAnySpinning}
                                    className={`flex flex-col items-center justify-center px-5 py-3.5 rounded-xl text-xs font-black tracking-widest text-white shadow-md transition-all transform active:scale-95 uppercase flex-shrink-0 h-[68px] focus:outline-none ${isAnySpinning ? 'bg-gray-300 shadow-none' : 'bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800'}`}
                                >
                                    {isAnySpinning ? (
                                        <span className="animate-pulse">隨機搭配中...</span>
                                    ) : (
                                        <React.Fragment>
                                            <DicesIcon />
                                            <span className="mt-1">隨機搭配</span>
                                        </React.Fragment>
                                    )}
                                </button>
                                
                            </div>
                        </div>
                        
                        <BottomNav />
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
