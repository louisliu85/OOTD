<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三重店凹逗穿搭靈感誌</title>
    
    <!-- Google Fonts: Inter & Noto Sans TC -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Noto+Sans+TC:wght@400;600;700;900&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'Noto Sans TC', 'sans-serif'] },
                    colors: {
                        blue: {
                            50: '#edf0fd', 100: '#dfe4fa', 200: '#c5cbf6', 300: '#9eaaf0',
                            400: '#7281e8', 500: '#4f5bdd', 600: '#3643ba', 700: '#2c35a6',
                            800: '#262d87', 900: '#242a6c',
                        },
                        amber: { 500: '#f59e0b', 600: '#d97706' }
                    }
                }
            }
        }
    </script>
    
    <!-- React, ReactDOM & PapaParse -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        @keyframes verticalBlurSpin {
            0% { filter: blur(0px); transform: translateY(0); }
            25% { filter: blur(2px); transform: translateY(-10px); opacity: 0.8;}
            50% { filter: blur(4px); transform: translateY(10px); opacity: 0.5;}
            75% { filter: blur(2px); transform: translateY(-10px); opacity: 0.8;}
            100% { filter: blur(0px); transform: translateY(0); }
        }
        .spinning-effect { animation: verticalBlurSpin 0.1s infinite linear; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes fadeUp {
            from { opacity: 0; transform: translate(-50%, 10px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
        .toast-enter { animation: fadeUp 0.3s ease-out forwards; }
        
        /* 專屬底部彈窗動畫 */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(100%); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-enter { animation: slideUp 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased selection:bg-blue-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const categoryLabels = { hat: "帽子", top: "衣服", bottom: "褲子", shoes: "鞋子", accessory: "配件" };
        const categoryOrder = ["hat", "top", "bottom", "shoes", "accessory"];

        // --- Icons ---
        const LockIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
        const UnlockIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>;
        const ChevronLeftIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>;
        const ChevronRightIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>;
        const DicesIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><circle cx="15.5" cy="15.5" r="1.5"></circle><circle cx="15.5" cy="8.5" r="1.5"></circle><circle cx="8.5" cy="15.5" r="1.5"></circle></svg>;
        const XIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
        const ArrowLeftIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>;
        const ExternalLinkIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>;
        const ListIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>;
        const FilterIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>;

        const ToggleBtn = ({ active, onClick, className = "", children }) => (
            <button type="button" onClick={onClick} className={`py-1.5 px-2 rounded-lg text-[11px] font-bold border-2 transition-all flex items-center justify-center space-x-1 ${active ? 'border-blue-600 bg-blue-50 text-blue-700 shadow-sm' : 'border-gray-200 bg-white text-gray-500 hover:border-blue-300'} ${className}`}>
                {children}
            </button>
        );

        // --- 拉霸機卡片組件 ---
        const SlotItem = ({ category, items, selectedIndex, isLocked, isSpinning, onSelect, onToggleLock }) => {
            const currentItem = items[selectedIndex];
            const isPresetItem = currentItem?.isOwned || currentItem?.isCart;
            
            const [navVisible, setNavVisible] = useState(true);
            const timerRef = useRef(null);

            const showNavTemporarily = () => {
                setNavVisible(true);
                if (timerRef.current) clearTimeout(timerRef.current);
                timerRef.current = setTimeout(() => setNavVisible(false), 3000);
            };

            useEffect(() => {
                if (!isSpinning && !isLocked && !isPresetItem) showNavTemporarily();
                else { setNavVisible(false); if (timerRef.current) clearTimeout(timerRef.current); }
                return () => clearTimeout(timerRef.current);
            }, [isSpinning, isLocked, isPresetItem, selectedIndex]);

            const handlePrev = (e) => {
                if (e) e.stopPropagation(); 
                if (isSpinning || isLocked || !currentItem) return;
                onSelect(selectedIndex === 0 ? items.length - 1 : selectedIndex - 1);
            };
            const handleNext = (e) => {
                if (e) e.stopPropagation();
                if (isSpinning || isLocked || !currentItem) return;
                onSelect(selectedIndex === items.length - 1 ? 0 : selectedIndex + 1);
            };

            return (
                <div className={`flex-1 min-h-0 max-h-[120px] flex bg-white rounded-xl shadow-sm border-2 transition-colors overflow-hidden ${isLocked ? (currentItem?.isOwned ? 'border-gray-300 bg-gray-50' : currentItem?.isCart ? 'border-amber-400 bg-amber-50' : 'border-orange-400 bg-orange-50') : 'border-transparent hover:border-blue-200'}`}>
                    
                    {/* 左側：拉霸機圖片 (調整為 100% 完美比例) */}
                    <div 
                        className="h-full aspect-square relative bg-gray-100 flex-shrink-0 flex items-center justify-center border-r border-gray-100 cursor-pointer overflow-hidden"
                        onClick={showNavTemporarily}
                    >
                        {currentItem ? (
                            <React.Fragment>
                                <img 
                                    src={currentItem.img} 
                                    alt={currentItem.name} 
                                    onError={(e) => { e.target.src = 'https://placehold.co/400x400/eeeeee/999999?text=無圖片'; }} 
                                    className={`w-[100%] h-[100%] object-contain mix-blend-multiply transition-all ${isSpinning && !isLocked ? 'spinning-effect opacity-60' : 'opacity-100'}`} 
                                />
                                {!isSpinning && !isLocked && !isPresetItem && (
                                    <React.Fragment>
                                        <button onClick={handlePrev} className={`absolute left-1 w-5 h-5 bg-white/80 hover:bg-white rounded-full flex items-center justify-center shadow-sm text-gray-600 transition-all duration-500 ${navVisible ? 'opacity-90' : 'opacity-0 pointer-events-none'}`}><ChevronLeftIcon /></button>
                                        <button onClick={handleNext} className={`absolute right-1 w-5 h-5 bg-white/80 hover:bg-white rounded-full flex items-center justify-center shadow-sm text-gray-600 transition-all duration-500 ${navVisible ? 'opacity-90' : 'opacity-0 pointer-events-none'}`}><ChevronRightIcon /></button>
                                    </React.Fragment>
                                )}
                                {currentItem.isOwned && (
                                    <div className="absolute inset-0 bg-gray-900/40 backdrop-blur-[1px] flex flex-col items-center justify-center">
                                        <span className="bg-gray-700 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full shadow-lg border border-white/30">✅ 已擁有（免計價）</span>
                                    </div>
                                )}
                                {currentItem.isCart && (
                                    <div className="absolute inset-0 bg-amber-900/20 backdrop-blur-[1px] flex flex-col items-center justify-center">
                                        <span className="bg-amber-500 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full shadow-lg border border-white/50">🛒 購物車（需計價）</span>
                                    </div>
                                )}
                                {!isPresetItem && <div className={`absolute bottom-0.5 right-0.5 bg-black/50 text-white text-[7px] px-1 py-0.5 rounded transition-opacity duration-500 ${navVisible ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>{selectedIndex + 1}/{items.length}</div>}
                            </React.Fragment>
                        ) : (
                            <div className="text-[9px] text-gray-400 text-center">無商品</div>
                        )}
                    </div>

                    <div className="flex-1 p-2 flex flex-col justify-between min-w-0 bg-white">
                        <div className="flex justify-between items-center">
                            <div className="flex items-center space-x-1.5 overflow-hidden">
                                <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded flex-shrink-0 ${currentItem?.isOwned ? 'bg-gray-200 text-gray-600' : currentItem?.isCart ? 'bg-amber-100 text-amber-700' : 'bg-blue-50 text-blue-600'}`}>
                                    {categoryLabels[category]}
                                </span>
                                <span className="text-[9px] text-gray-400 font-mono truncate">{currentItem?.id || '----'}</span>
                            </div>
                            <button onClick={onToggleLock} disabled={isSpinning || !currentItem || isPresetItem} className={`p-1 -mr-1 rounded-full transition-colors flex-shrink-0 ${isLocked ? 'text-orange-500 bg-orange-50' : 'text-gray-400 hover:bg-gray-100'} disabled:opacity-50`} title={isPresetItem ? "預設商品強制鎖定" : "鎖定"}>
                                {isLocked ? <LockIcon /> : <UnlockIcon />}
                            </button>
                        </div>

                        <div className="flex-1 flex items-center my-0.5">
                            <h4 className="text-[11px] font-bold text-gray-800 line-clamp-2 leading-snug">{currentItem?.name || '---'}</h4>
                        </div>

                        <div className="flex justify-between items-end">
                            {currentItem?.isOwned ? (
                                <span className="text-[11px] font-black text-gray-400 font-sans tracking-tighter">免算錢</span>
                            ) : (
                                <span className={`text-[14px] font-black font-sans tracking-tighter leading-none ${currentItem?.isCart ? 'text-amber-600' : 'text-gray-900'}`}>
                                    ${currentItem?.price || '0'}
                                </span>
                            )}
                            {currentItem?.id && (
                                <a 
                                    href={`https://www.decathlon.tw/${currentItem.id}/1769`} 
                                    target="_blank" 
                                    rel="noopener noreferrer" 
                                    className="text-[9px] bg-blue-50 text-blue-600 border border-blue-100 hover:bg-blue-600 hover:text-white px-1.5 py-0.5 rounded transition-colors flex items-center space-x-0.5 whitespace-nowrap"
                                >
                                    <span>前往官網</span>
                                    <ExternalLinkIcon />
                                </a>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // --- 主應用程式 ---
        const App = () => {
            // =========================================================
            // 👇 填寫 Google Sheets 發布為 CSV 的網址 👇
            // =========================================================
            const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR14WxdTycKfRM64qq13BxMrMH7OUOONQFhvr2StbozuNBcwulMwyb9H2Q3_nX9DoKvk4DCDGY5E8x-/pub?output=csv"; 
            const LOOKBOOK_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR14WxdTycKfRM64qq13BxMrMH7OUOONQFhvr2StbozuNBcwulMwyb9H2Q3_nX9DoKvk4DCDGY5E8x-/pub?gid=378637456&single=true&output=csv"; 

            const [dbData, setDbData] = useState(null);
            const [lookbookData, setLookbookData] = useState([]); 
            
            const [isDbLoading, setIsDbLoading] = useState(true);
            const [dbFatalError, setDbFatalError] = useState(false);
            const [updateDate, setUpdateDate] = useState('讀取中...'); 

            const [view, setView] = useState('magazine'); 
            
            const [budget, setBudget] = useState(4000); 
            const [scenario, setScenario] = useState('all');
            
            // 拉霸機與設定頁：單選
            const [targetGender, setTargetGender] = useState('all');
            
            // 型錄專用：支援複選狀態，預設全選
            const [tempGenders, setTempGenders] = useState(['men', 'women', 'kids']);
            const [catalogGenders, setCatalogGenders] = useState(['men', 'women', 'kids']);
            
            const [presetItems, setPresetItems] = useState([]); 
            const [presetInputCat, setPresetInputCat] = useState('top');
            const [presetInputId, setPresetInputId] = useState('');
            const [presetType, setPresetType] = useState('owned'); 
            const [toast, setToast] = useState("");

            const [filteredDb, setFilteredDb] = useState(null);
            const [selections, setSelections] = useState({ hat: 0, top: 0, bottom: 0, shoes: 0, accessory: 0 });
            const [locked, setLocked] = useState({ hat: false, top: false, bottom: false, shoes: false, accessory: false });
            const [spinningStates, setSpinningStates] = useState({ hat: false, top: false, bottom: false, shoes: false, accessory: false });
            const [isOverBudget, setIsOverBudget] = useState(false);
            
            // 型錄專用狀態
            const [catalogActiveTab, setCatalogActiveTab] = useState('all');
            const [isFilterModalOpen, setIsFilterModalOpen] = useState(false);

            // 初始化：讀取資料庫
            useEffect(() => {
                if (!GOOGLE_SHEET_CSV_URL) {
                    setDbFatalError(true);
                    setIsDbLoading(false);
                    return;
                }

                const fetchDatabase = new Promise((resolve, reject) => {
                    Papa.parse(GOOGLE_SHEET_CSV_URL, {
                        download: true,
                        header: true,
                        complete: (results) => {
                            try {
                                const parsedData = { hat: [], top: [], bottom: [], shoes: [], accessory: [] };
                                let fetchedDate = ''; 
                                
                                results.data.forEach(row => {
                                    if (!fetchedDate && row.date && row.date.trim() !== '') {
                                        fetchedDate = row.date.trim();
                                    }

                                    const cat = row.category?.trim().toLowerCase();
                                    if (row.id && cat && parsedData[cat]) {
                                        const n = row.name?.trim() || "未命名商品";
                                        let itemGender = '中性';
                                        if (row.gender && row.gender.trim() !== '') itemGender = row.gender.trim();

                                        let itemLabels = row.label && row.label.trim() !== '' ? row.label.trim() : '';

                                        parsedData[cat].push({
                                            id: row.id.trim(),
                                            name: n,
                                            price: parseInt(row.price, 10) || 0,
                                            img: `https://product-picture.decathlon.cn/model/${row.id.trim()}.jpg?f=1000`,
                                            label: itemLabels,
                                            gender: itemGender
                                        });
                                    }
                                });

                                categoryOrder.forEach(cat => {
                                    if (parsedData[cat].length === 0) throw new Error(`分類 '${cat}' 缺少商品`);
                                });

                                setDbData(parsedData);
                                setUpdateDate(fetchedDate || new Date().toLocaleDateString('zh-TW'));
                                resolve();
                            } catch (err) {
                                reject(err);
                            }
                        },
                        error: (err) => reject(err)
                    });
                });

                const fetchLookbook = new Promise((resolve, reject) => {
                    if (!LOOKBOOK_CSV_URL) {
                        reject(new Error("未提供雜誌資料庫網址"));
                        return;
                    }
                    Papa.parse(LOOKBOOK_CSV_URL, {
                        download: true,
                        header: true,
                        complete: (results) => {
                            try {
                                const parsedLookbook = [];
                                results.data.forEach((row, index) => {
                                    if (row.title && row.title.trim() !== '') {
                                        parsedLookbook.push({
                                            id: index + 1,
                                            title: row.title.trim(),
                                            desc: row.description ? row.description.trim() : "",
                                            coverImg: row.cover_image && row.cover_image.trim() !== '' ? row.cover_image.trim() : "https://images.unsplash.com/photo-1551632811-561732d1e306?q=80&w=1000&auto=format&fit=crop",
                                            productIds: row.product_ids ? row.product_ids.split(/[,、]/).map(id => id.trim()).filter(id => id) : []
                                        });
                                    }
                                });

                                if (parsedLookbook.length > 0) {
                                    setLookbookData(parsedLookbook);
                                    resolve();
                                } else {
                                    reject(new Error("雜誌資料庫無有效資料"));
                                }
                            } catch (err) {
                                reject(err);
                            }
                        },
                        error: (err) => reject(err)
                    });
                });

                Promise.all([fetchDatabase, fetchLookbook])
                    .then(() => setIsDbLoading(false))
                    .catch(err => {
                        console.error("資料庫載入發生致命錯誤：", err);
                        setDbFatalError(true);
                        setIsDbLoading(false);
                    });

            }, []);

            const showMsg = (m) => { setToast(m); setTimeout(() => setToast(""), 3000); };

            const handleAddPreset = (e) => {
                e.preventDefault();
                if (!presetInputId.trim()) return showMsg("請輸入商品貨號！");
                if (presetItems.some(i => i.id === presetInputId.trim())) return showMsg("已經加入過這個商品了！");
                if (presetItems.some(i => i.category === presetInputCat)) return showMsg(`每個分類只能加入一件預設商品喔！`);
                
                let foundName = "我的專屬裝備";
                let foundPrice = 999;
                if (dbData) {
                    Object.values(dbData).forEach(catItems => {
                        const item = catItems.find(i => i.id === presetInputId.trim());
                        if (item) { foundName = item.name; foundPrice = item.price; }
                    });
                }

                setPresetItems([...presetItems, { category: presetInputCat, id: presetInputId.trim(), name: foundName, type: presetType, realPrice: foundPrice }]);
                setPresetInputId('');
                showMsg(`已加入: ${foundName}`);
            };

            const handleRemovePreset = (id) => setPresetItems(presetItems.filter(i => i.id !== id));

            // 過濾邏輯
            const generateFilteredDb = (currentScenario, genderCondition) => {
                if (!dbData) return null;
                const scenarioKeywords = {
                    trekking: ['健行'], island: ['環島'], hiking: ['行腳'],
                    baiyue: ['百岳'], winter: ['冬季']
                };

                let newDb = {};
                categoryOrder.forEach(cat => {
                    let items = dbData[cat].filter(i => {
                        let sMatch = false;
                        if (currentScenario === 'all') sMatch = true;
                        else {
                            const lblText = (i.label || '').toLowerCase();
                            const keywords = scenarioKeywords[currentScenario] || [];
                            sMatch = keywords.some(kw => lblText.includes(kw));
                        }

                        let gMatch = false;
                        const gText = (i.gender || '');
                        if (Array.isArray(genderCondition)) {
                            // 陣列模式 (型錄複選使用)
                            if (genderCondition.length === 3) gMatch = true;
                            else {
                                if (genderCondition.includes('kids') && (gText.includes('兒童') || gText.includes('童'))) gMatch = true;
                                if (genderCondition.includes('men') && (gText.includes('男') || gText.includes('中性'))) gMatch = true;
                                if (genderCondition.includes('women') && (gText.includes('女') || gText.includes('中性'))) gMatch = true;
                            }
                        } else {
                            // 單一字串模式 (拉霸機單選使用)
                            if (genderCondition === 'all') gMatch = true;
                            else if (genderCondition === 'kids' && (gText.includes('兒童') || gText.includes('童'))) gMatch = true;
                            else if (genderCondition === 'men' && (gText.includes('男') || gText.includes('中性'))) gMatch = true;
                            else if (genderCondition === 'women' && (gText.includes('女') || gText.includes('中性'))) gMatch = true;
                        }
                        return sMatch && gMatch;
                    });

                    // 寬鬆防呆 1
                    if (items.length === 0) {
                        items = dbData[cat].filter(i => {
                            let gMatch = false;
                            const gText = (i.gender || '');
                            if (Array.isArray(genderCondition)) {
                                if (genderCondition.length === 3) gMatch = true;
                                else {
                                    if (genderCondition.includes('kids') && (gText.includes('兒童') || gText.includes('童'))) gMatch = true;
                                    if (genderCondition.includes('men') && (gText.includes('男') || gText.includes('中性'))) gMatch = true;
                                    if (genderCondition.includes('women') && (gText.includes('女') || gText.includes('中性'))) gMatch = true;
                                }
                            } else {
                                if (genderCondition === 'all') gMatch = true;
                                else if (genderCondition === 'kids' && (gText.includes('兒童') || gText.includes('童'))) gMatch = true;
                                else if (genderCondition === 'men' && (gText.includes('男') || gText.includes('中性'))) gMatch = true;
                                else if (genderCondition === 'women' && (gText.includes('女') || gText.includes('中性'))) gMatch = true;
                            }
                            return gMatch;
                        });
                    }
                    // 寬鬆防呆 2
                    if (items.length === 0) items = dbData[cat]; 
                    newDb[cat] = items;
                });

                // 注入鎖定商品
                presetItems.forEach(preset => {
                    const customItem = {
                        id: preset.id, name: preset.name, price: preset.type === 'owned' ? 0 : preset.realPrice, 
                        isOwned: preset.type === 'owned', isCart: preset.type === 'cart',
                        img: `https://product-picture.decathlon.cn/model/${preset.id}.jpg?f=1000`
                    };
                    newDb[preset.category] = [customItem, ...newDb[preset.category].filter(i => i.id !== preset.id)];
                });
                return newDb;
            };

            const goToSlot = () => {
                if (!dbData) return;
                const newDb = generateFilteredDb(scenario, targetGender); 

                let initialSelections = { hat: 0, top: 0, bottom: 0, shoes: 0, accessory: 0 };
                let initialLocked = { hat: false, top: false, bottom: false, shoes: false, accessory: false };

                presetItems.forEach(preset => {
                    initialSelections[preset.category] = 0; 
                    initialLocked[preset.category] = true;  
                });

                setFilteredDb(newDb);
                setSelections(initialSelections);
                setLocked(initialLocked);
                setIsOverBudget(false);
                setView('slot');
            };

            const currentTotal = (filteredDb && view === 'slot') ? categoryOrder.reduce((sum, cat) => {
                const item = filteredDb[cat][selections[cat]];
                return sum + (item ? item.price : 0);
            }, 0) : 0;

            useEffect(() => { setIsOverBudget(currentTotal > budget); }, [currentTotal, budget]);

            const isAnySpinning = Object.values(spinningStates).some(s => s);

            const handleSpinAll = () => {
                if (isAnySpinning || !filteredDb) return;

                let lockedCost = 0;
                categoryOrder.forEach(cat => {
                    if (locked[cat] && filteredDb[cat][selections[cat]]) lockedCost += filteredDb[cat][selections[cat]].price;
                });
                
                let availableBudget = budget - lockedCost;
                let unlockedCats = categoryOrder.filter(cat => !locked[cat]);
                if (unlockedCats.length === 0) return;

                let bestCombo = { ...selections };
                let foundCombo = false;

                for (let i = 0; i < 150; i++) {
                    let tempCost = 0;
                    let tempCombo = {};
                    unlockedCats.forEach(cat => {
                        let items = filteredDb[cat];
                        let randIdx = Math.floor(Math.random() * items.length);
                        tempCombo[cat] = randIdx;
                        tempCost += items[randIdx].price;
                    });
                    if (tempCost <= availableBudget) {
                        bestCombo = { ...bestCombo, ...tempCombo };
                        foundCombo = true; break;
                    }
                }

                if (!foundCombo) {
                    unlockedCats.forEach(cat => {
                        let items = filteredDb[cat];
                        let minPrice = Math.min(...items.map(it => it.price));
                        let minIdx = items.findIndex(it => it.price === minPrice);
                        bestCombo[cat] = minIdx;
                    });
                    showMsg("預算極限！已為您配對最便宜的組合。");
                }

                const newSpinning = { ...spinningStates };
                unlockedCats.forEach(cat => newSpinning[cat] = true);
                setSpinningStates(newSpinning);

                categoryOrder.forEach((cat, index) => {
                    if (!locked[cat]) {
                        const interval = setInterval(() => {
                            setSelections(prev => ({ ...prev, [cat]: Math.floor(Math.random() * filteredDb[cat].length) }));
                        }, 80);
                        setTimeout(() => {
                            clearInterval(interval);
                            setSelections(prev => ({ ...prev, [cat]: bestCombo[cat] }));
                            setSpinningStates(prev => ({ ...prev, [cat]: false }));
                        }, 800 + (index * 200));
                    }
                });
            };

            const returnToSlot = (newLocks = null, newSelections = null) => {
                const currentLocks = newLocks || locked;
                const currentSelections = newSelections || selections;
                
                const newDb = generateFilteredDb(scenario, targetGender); 
                const finalSelections = { ...currentSelections };
                
                categoryOrder.forEach(cat => {
                    const selectedItem = filteredDb[cat] ? filteredDb[cat][currentSelections[cat]] : null;
                    
                    if (selectedItem) {
                        if (currentLocks[cat]) {
                            const existingIdx = newDb[cat].findIndex(i => i.id === selectedItem.id);
                            if (existingIdx === -1) {
                                newDb[cat] = [selectedItem, ...newDb[cat]];
                                finalSelections[cat] = 0;
                            } else {
                                finalSelections[cat] = existingIdx;
                            }
                        } else {
                            const existingIdx = newDb[cat].findIndex(i => i.id === selectedItem.id);
                            if (existingIdx !== -1) finalSelections[cat] = existingIdx;
                            else finalSelections[cat] = 0;
                        }
                    } else {
                        finalSelections[cat] = 0;

                setView('slot');

                const urlsToLoad = [];
                if (tempDb) {
                    categoryOrder.forEach(cat => {
                        tempDb[cat].forEach(item => {

                        });
                    });

                const loadImage = (url) => new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => resolve();
                    img.onerror = () => resolve(); 
                    img.src = url;
                });

                const minTimePromise = new Promise(resolve => setTimeout(resolve, 600));
                const maxTimePromise = new Promise(resolve => setTimeout(resolve, 3000));
                const loadAllPromise = Promise.all(urlsToLoad.map(loadImage));

                Promise.race([
                    Promise.all([loadAllPromise, minTimePromise]), 
                    maxTimePromise
                ]).then(() => {
                    setCatalogActiveTab('all');
                    setFilteredDb(tempDb); 
                    setView('catalog');

                                {/* 底部引導區塊 CTA */}

                                    <button onClick={() => setView('setup')} className="w-full bg-blue-600 text-white font-black text-sm py-4 rounded-xl shadow-lg hover:bg-blue-700 active:scale-95 transition-all uppercase tracking-widest flex justify-center items-center">

            if (view === 'catalog_loading') {
                return (
                    <div className="h-[100dvh] bg-gray-50 flex justify-center overflow-hidden">
                        <div className="w-full max-w-md bg-gray-50 h-full shadow-2xl relative flex flex-col items-center justify-center">
                            <div className="animate-spin rounded-full h-12 w-12 border-b-4 border-blue-600 mb-4"></div>
                            <p className="text-gray-500 text-xs font-bold tracking-widest animate-pulse">載入裝備型錄中...</p>
                        </div>
                    </div>
                );
            }

            // --- 視圖 3：商品總覽清單 (Catalog) ---
            if (view === 'catalog') {
                const visibleCategories = catalogActiveTab === 'all' ? categoryOrder : [catalogActiveTab];

                return (
                    <div className="h-[100dvh] bg-gray-50 flex justify-center overflow-hidden relative">
                        {toast && <div className="fixed top-14 left-1/2 transform -translate-x-1/2 z-50 toast-enter bg-gray-900 text-white px-4 py-2 rounded-lg text-xs font-bold shadow-xl">{toast}</div>}
                        
                        {/* 💡 修正：在外層容器加上 overflow-hidden，並把 Modal 真正放進手機框內 */}
                        <div className="w-full max-w-md bg-gray-50 h-full shadow-2xl relative flex flex-col overflow-hidden">
                            
                            {/* 彈出式篩選視窗 Modal */}
                            {isFilterModalOpen && (
                                <div className="absolute inset-0 z-[100] flex flex-col justify-end bg-black/60 backdrop-blur-[2px] transition-all">
                                    <div className="w-full bg-white rounded-t-3xl p-5 shadow-2xl modal-enter max-h-[85vh] flex flex-col">
                                        <div className="flex justify-between items-center mb-4 border-b border-gray-100 pb-3 flex-shrink-0">
                                            <h3 className="text-sm font-black text-gray-800 flex items-center">
                                                <FilterIcon /> <span className="ml-1.5">進階篩選</span>
                                            </h3>
                                            <button onClick={() => setIsFilterModalOpen(false)} className="p-1 text-gray-400 hover:text-red-500 transition-colors"><XIcon /></button>
                                        </div>
                                        
                                        <div className="mb-6 overflow-y-auto no-scrollbar">
                                            <label className="text-xs font-bold text-gray-500 mb-3 block">裝備對象（可複選）</label>
                                            
                                            {/* 移除混合選項，改為 3 等分的網格排版 */}
                                            <div className="grid grid-cols-3 gap-2">
                                                <button 
                                                    onClick={() => {
                                                        if(tempGenders.includes('men') && tempGenders.length > 1) setTempGenders(tempGenders.filter(g => g !== 'men'));
                                                        else if(!tempGenders.includes('men')) setTempGenders([...tempGenders, 'men']);
                                                    }}
                                                    className={`py-3 rounded-xl text-xs font-bold border-2 transition-all ${tempGenders.includes('men') ? 'border-blue-600 bg-blue-50 text-blue-700 shadow-sm' : 'border-gray-200 text-gray-500 hover:border-blue-300'}`}
                                                >👦 男款</button>
                                                <button 
                                                    onClick={() => {
                                                        if(tempGenders.includes('women') && tempGenders.length > 1) setTempGenders(tempGenders.filter(g => g !== 'women'));
                                                        else if(!tempGenders.includes('women')) setTempGenders([...tempGenders, 'women']);
                                                    }}
                                                    className={`py-3 rounded-xl text-xs font-bold border-2 transition-all ${tempGenders.includes('women') ? 'border-blue-600 bg-blue-50 text-blue-700 shadow-sm' : 'border-gray-200 text-gray-500 hover:border-blue-300'}`}
                                                >👧 女款</button>
                                                <button 
                                                    onClick={() => {
                                                        if(tempGenders.includes('kids') && tempGenders.length > 1) setTempGenders(tempGenders.filter(g => g !== 'kids'));
                                                        else if(!tempGenders.includes('kids')) setTempGenders([...tempGenders, 'kids']);
                                                    }}
                                                    className={`py-3 rounded-xl text-xs font-bold border-2 transition-all ${tempGenders.includes('kids') ? 'border-blue-600 bg-blue-50 text-blue-700 shadow-sm' : 'border-gray-200 text-gray-500 hover:border-blue-300'}`}
                                                >👶 兒童</button>
                                            </div>
                                        </div>

                                        <button onClick={applyCatalogFilter} className="w-full py-4 bg-blue-600 text-white rounded-xl font-black text-sm tracking-widest uppercase hover:bg-blue-700 active:scale-95 transition-all shadow-lg flex-shrink-0">
                                            套用篩選條件
                                        </button>
                                    </div>
                                </div>
                            )}

                            {/* Header 包含篩選按鈕 */}
                            <div className="bg-white shadow-sm z-20 flex-shrink-0 border-b border-gray-200">
                                <div className="px-3 py-2 flex justify-between items-center">
                                    <button onClick={() => returnToSlot()} className="p-1.5 -ml-1 rounded-full text-blue-600 bg-blue-50 hover:bg-blue-100 transition-colors" title="回到拉霸機">
                                        <ArrowLeftIcon />
                                    </button>
                                    <div className="text-center w-full">
                                        <h1 className="text-xs font-black text-gray-800 tracking-widest uppercase">裝備型錄</h1>
                                        <p className="text-[8px] text-blue-600 font-bold mt-0.5 tracking-widest">
                                            {/* 當 3 個選項都選取時，顯示「全部對象」 */}
                                            {catalogGenders.length === 3 ? '全部對象' : catalogGenders.map(g => g === 'men' ? '男' : g === 'women' ? '女' : '兒童').join(' / ')}
                                        </p>
                                    </div>
                                    <button 
                                        onClick={() => { setTempGenders(catalogGenders); setIsFilterModalOpen(true); }} 
                                        className="p-1.5 -mr-1 rounded-full text-gray-500 bg-gray-100 hover:bg-blue-100 hover:text-blue-600 transition-colors" title="進階篩選"
                                    >
                                        <FilterIcon />
                                    </button>
                                </div>

                                {/* 分類滑動標籤 */}
                                <div className="flex overflow-x-auto no-scrollbar px-3 pt-2.5 pb-3 space-x-2">
                                    <button 
                                        onClick={() => setCatalogActiveTab('all')}
                                        className={`flex-shrink-0 px-3 py-1.5 rounded-full text-[11px] font-bold transition-colors border ${catalogActiveTab === 'all' ? 'bg-gray-800 text-white border-gray-800 shadow-sm' : 'bg-white text-gray-500 border-gray-200 hover:bg-gray-50'}`}
                                    >
                                        全部裝備
                                    </button>
                                    {categoryOrder.map(cat => (
                                        <button 
                                            key={`tab-${cat}`}
                                            onClick={() => setCatalogActiveTab(cat)}
                                            className={`flex-shrink-0 px-3 py-1.5 rounded-full text-[11px] font-bold transition-colors border ${catalogActiveTab === cat ? 'bg-blue-600 text-white border-blue-600 shadow-sm' : 'bg-white text-gray-500 border-gray-200 hover:bg-gray-50'}`}
                                        >
                                            {categoryLabels[cat]} <span className="opacity-80 ml-0.5 font-mono text-[9px]">({filteredDb[cat].length})</span>
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* 總覽內容 */}
                            <div className="flex-1 overflow-y-auto no-scrollbar p-3 space-y-4 pb-10">
                                {visibleCategories.map(cat => (
                                    <div key={cat} className="bg-white rounded-xl shadow-sm border border-gray-100 p-3">
                                        <h3 className="text-[11px] font-bold text-gray-800 mb-3 border-b border-gray-100 pb-2 flex items-center">
                                            <span className="w-1.5 h-3 bg-blue-600 rounded-full mr-1.5"></span>
                                            {categoryLabels[cat]}
                                        </h3>
                                        <div className="grid grid-cols-2 gap-3">
                                            {filteredDb[cat].map((item, idx) => (
                                                <div key={item.id} className="flex flex-col border border-gray-100 rounded-xl overflow-hidden relative shadow-sm hover:border-blue-200 transition-colors">
                                                    {/* 總覽型錄圖片 (調整為 90% 完美比例) */}
                                                    <div className="aspect-square bg-gray-50 relative flex items-center justify-center overflow-hidden">
                                                        <img src={item.img} alt={item.name} className="w-[100%] h-[100%] object-contain mix-blend-multiply" onError={(e) => { e.target.src = 'https://placehold.co/400x400/eeeeee/999999?text=無圖片'; }} />
                                                        {item.isOwned && <div className="absolute inset-0 bg-gray-900/50 flex items-center justify-center text-white text-[10px] font-bold backdrop-blur-[1px]">✅ 已擁有</div>}
                                                        {item.isCart && <div className="absolute inset-0 bg-amber-900/30 flex items-center justify-center text-white text-[10px] font-bold backdrop-blur-[1px]">🛒 購物車</div>}
                                                    </div>
                                                    <div className="p-2.5 flex flex-col flex-1 bg-white">
                                                        <h4 className="text-[11px] font-bold text-gray-800 line-clamp-2 leading-snug flex-1">{item.name}</h4>
                                                        <div className="flex justify-between items-end mt-1.5 mb-2">
                                                            <p className="text-[9px] text-gray-400 font-mono">{item.id}</p>
                                                            <p className="text-[12px] font-black text-gray-800 font-mono">${item.price}</p>
                                                        </div>
                                                        <button 
                                                            onClick={() => {
                                                                const newSelections = { ...selections, [cat]: idx };
                                                                const newLocks = { ...locked, [cat]: true };
                                                                returnToSlot(newLocks, newSelections);
                                                            }}
                                                            className="w-full py-2 bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white text-[10px] font-bold rounded-lg transition-colors flex justify-center items-center"
                                                        >
                                                            鎖定此裝備
                                                        </button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}

                                {/* 頁尾更新日期提示 */}
                                <div className="pt-4 pb-6 text-[10px] text-gray-400 text-center leading-relaxed">
                                    此頁推薦內容僅供參考，實際商品與價格以現場為準。<br/>
                                    最後更新日期：{updateDate}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // --- 視圖 2：滿版動態拉霸機 ---
            const cartCount = presetItems.filter(i => i.type === 'cart').length;
            const ownedCount = presetItems.filter(i => i.type === 'owned').length;

            return (
                <div className="h-[100dvh] bg-gray-50 flex justify-center overflow-hidden">
                    {toast && <div className="fixed top-14 left-1/2 transform -translate-x-1/2 z-50 toast-enter bg-gray-900 text-white px-4 py-2 rounded-lg text-xs font-bold shadow-xl">{toast}</div>}

                    <div className="w-full max-w-md bg-gray-50 h-full shadow-2xl relative flex flex-col">
                        
                        {/* 頂部 Header */}
                        <div className="bg-white px-3 py-2 shadow-sm z-20 flex-shrink-0 flex justify-between items-center border-b border-gray-200">
                            <button onClick={() => setView('setup')} className="p-1.5 -ml-1 rounded-full text-blue-600 bg-blue-50 hover:bg-blue-100 transition-colors" title="回到設定">
                                <ArrowLeftIcon />
                            </button>
                            <div className="text-center">
                                <h1 className="text-xs font-black text-gray-800 tracking-widest uppercase">登山健行裝備拉霸機</h1>
                                <p className="text-[8px] text-blue-600 font-bold mt-0.5">
                                    ${budget} | {targetGender==='all'?'不拘':targetGender==='men'?'男':targetGender==='women'?'女':'童'} | { } 
                                    {scenario==='all'?'通用':scenario==='trekking'?'健行':scenario==='island'?'環島':scenario==='hiking'?'行腳':scenario==='baiyue'?'百岳':'冬季'}
                                </p>
                            </div>
                            <button onClick={openCatalog} className="p-1.5 -mr-1 rounded-full text-blue-600 bg-blue-50 hover:bg-blue-100 transition-colors" title="裝備總覽">
                                <ListIcon />
                            </button>
                        </div>

                        <div className="flex-1 flex flex-col justify-center p-2.5 gap-2 overflow-hidden z-10">
                            {categoryOrder.map((cat) => (
                                <SlotItem 
                                    key={cat} category={cat} items={filteredDb[cat]}
                                    selectedIndex={selections[cat]} isLocked={locked[cat]}
                                    isSpinning={spinningStates[cat]}
                                    onSelect={(idx) => setSelections(p => ({...p, [cat]: idx}))}
                                    onToggleLock={() => setLocked(p => ({...p, [cat]: !p[cat]}))}
                                />
                            ))}
                        </div>

                        {/* 底部控制列 */}
                        <div className="bg-white/95 backdrop-blur-md border-t border-gray-200 shadow-[0_-5px_15px_rgba(0,0,0,0.05)] rounded-t-2xl z-20 flex-shrink-0">
                            <div className="px-4 pt-3 pb-2 flex justify-between items-end">
                                <div className="flex flex-col">
                                    <span className="text-[9px] font-bold text-gray-400 uppercase tracking-widest">目前搭配總金額</span>
                                    <div className="flex flex-col space-y-0.5 mt-0.5">
                                        {ownedCount > 0 && <span className="text-[8px] text-gray-500 font-medium">✅ 免除 {ownedCount} 件已有裝備</span>}
                                        {cartCount > 0 && <span className="text-[8px] text-amber-600 font-medium">🛒 含 {cartCount} 件購物車商品</span>}
                                    </div>
                                </div>
                                <div className="flex flex-col items-end">
                                    {isOverBudget && <span className="text-[8px] font-bold text-red-500 animate-pulse mb-1">⚠️ 超出預算 ${currentTotal - budget}</span>}
                                    <span className={`text-xl font-black font-sans tracking-tighter transition-colors leading-none ${isOverBudget ? 'text-red-500' : 'text-gray-900'}`}>
                                        ${currentTotal.toLocaleString()}
                                    </span>
                                </div>
                            </div>
                            
                            <div className="px-3 pb-3 flex space-x-2">
                                <button 
                                    onClick={handleSpinAll}
                                    disabled={isAnySpinning}
                                    className={`flex-1 flex items-center justify-center space-x-1.5 py-3 rounded-xl text-xs font-black tracking-widest text-white shadow-md transition-all transform active:scale-95 uppercase ${isAnySpinning ? 'bg-gray-300 shadow-none' : 'bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800'}`}
                                >
                                    {isAnySpinning ? <span className="animate-pulse">MATCHING...</span> : <React.Fragment><DicesIcon /><span>預算內隨機搭配</span></React.Fragment>}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
